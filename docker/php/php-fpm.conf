
[www]
user  = appuser
group = appgroup
listen = 0.0.0.0:9000

; dynamic: tốt nhất cho web app — scale theo load
pm = dynamic
; Rule of thumb: RAM_available / ~30MB_per_worker
pm.max_children      = 20
pm.start_servers     = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 8

; Recycle workers sau N requests — tránh memory leak
pm.max_requests = 500

; ── Timeouts ────────────────────────────────────────────────
request_terminate_timeout = 60s
request_slowlog_timeout   = 5s

; ── Logging ─────────────────────────────────────────────────
slowlog              = /dev/stderr
access.log           = /dev/null   ; tắt access log ở FPM, để Nginx lo
php_flag[display_errors] = off
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on

; ── Environment ─────────────────────────────────────────────
clear_env = no

; ── Status endpoint (cho health check / Prometheus) ─────────
pm.status_path = /fpm-status
ping.path       = /fpm-ping
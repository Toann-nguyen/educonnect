# ============================================================
# docker-compose.prod.yml
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================================

name: educonnect

services:

  # ── Nginx reverse proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - .:/var/www/html:ro                           # static files
      - ./docker/ssl:/etc/nginx/ssl:ro               # SSL certs
      - certbot_www:/var/www/certbot:ro              # Let's Encrypt challenge
      - nginx_logs:/var/log/nginx
    environment:
      - NGINX_HOST=${NGINX_HOST}
    depends_on:
      php:
        condition: service_healthy
    networks:
      - educonnect
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── PHP-FPM application ──────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: unless-stopped
    volumes:
      - storage_data:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - educonnect
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 512M
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── MySQL ────────────────────────────────────────────────────
  mysql:
    image: mysql/mysql-server:8.0
    restart: unless-stopped
    # KHÔNG expose port ra ngoài — chỉ internal network
    # ports: - "3306:3306"  ← BỎ ở production
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: "localhost"           # root chỉ local — bảo mật hơn '%'
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - educonnect
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # KHÔNG expose port ra ngoài
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      - educonnect
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Queue Worker (Horizon) ───────────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: unless-stopped
    command: php /var/www/html/artisan horizon
    volumes:
      - storage_data:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_CONNECTION: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - educonnect
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Scheduler ───────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php /var/www/html/artisan schedule:run --no-interaction;
        sleep 60;
      done"
    volumes:
      - storage_data:/var/www/html/storage/app
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - educonnect
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ── Certbot (Let's Encrypt — tự động renew) ──────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./docker/ssl:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Chạy thủ công lần đầu:
    # docker compose run --rm certbot certonly --webroot -w /var/www/certbot -d yourdomain.com
    # Cron renew: 0 12 * * * docker compose run --rm certbot renew
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - educonnect

# ── Networks ─────────────────────────────────────────────────
networks:
  educonnect:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── Volumes ──────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  storage_data:
    driver: local
  nginx_logs:
    driver: local
  certbot_www:
    driver: local
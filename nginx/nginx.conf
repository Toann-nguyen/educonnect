# ============================================================
# nginx.conf — production main config
# ============================================================

user  nginx;
worker_processes auto;           # tự detect số CPU core
worker_rlimit_nofile 65535;      # max open files per worker

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;     # connections per worker
    multi_accept       on;       # accept nhiều connections 1 lúc
    use                epoll;    # Linux event model tối ưu nhất
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging format (JSON — dễ đẩy vào ELK / Loki) ──────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"response_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"referer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ─────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 4096;
    server_tokens      off;      # ẩn Nginx version

    # ── Buffer tuning ────────────────────────────────────────
    client_max_body_size    100M;
    client_body_buffer_size 128k;
    client_header_timeout   15s;
    client_body_timeout     15s;
    send_timeout            15s;

    # ── Gzip compression ─────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── Rate limiting zones ──────────────────────────────────
    # Zone chung — 10MB lưu ~160k IP
    limit_req_zone $binary_remote_addr zone=general:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=120r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;   # login/register

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── SSL shared cache ─────────────────────────────────────
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Include site configs
    include /etc/nginx/conf.d/*.conf;
}